# Winget Pkgs Workflow Add Or Update Package Version

## Action

Follow the add-or-update-package-version workflow:
1. Create a new directory under manifests/<first-letter>/<Publisher>/<Package>/<Version>/
2. Add <Package>.installer.yaml with installer metadata
3. Add <Package>.locale.<lang>.yaml for one or more languages (often en-US, zh-CN, etc.)
4. Add <Package>.yaml with general package metadata

## Evidence

- Workflow detected from commit patterns
- Frequency: ~30x per month
- Files: manifests/*/*/*/*/*.installer.yaml, manifests/*/*/*/*/*.locale.*.yaml, manifests/*/*/*/*/*.yaml

