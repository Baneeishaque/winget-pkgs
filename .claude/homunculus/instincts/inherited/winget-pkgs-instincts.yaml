# Winget Pkgs Workflow Add New Package Version

## Action

Follow the add-new-package-version workflow:
1. Create a new directory under manifests/<first-letter>/<Publisher>/<Package>/<Version>/
2. Add <Package>.installer.yaml file for the new version
3. Add <Package>.locale.<locale>.yaml files (e.g., en-US, zh-CN, etc.) as needed
4. Add <Package>.yaml manifest file

## Evidence

- Workflow detected from commit patterns
- Frequency: ~20x per month
- Files: manifests/*/*/*/*/*.installer.yaml, manifests/*/*/*/*/*.locale.*.yaml, manifests/*/*/*/*/*.yaml

