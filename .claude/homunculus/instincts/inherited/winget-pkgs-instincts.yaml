# Winget Pkgs Workflow Add Or Update Package Version

## Action

Follow the add-or-update-package-version workflow:
1. Create a new directory under manifests/<first-letter>/<Publisher>/<PackageName>/<Version>/
2. Add <PackageId>.installer.yaml manifest file for the installer details
3. Add <PackageId>.locale.en-US.yaml manifest file for English locale metadata
4. Optionally add additional locale YAML files (e.g., .locale.zh-CN.yaml, .locale.ja-JP.yaml, .locale.pt-BR.yaml) if the package supports multiple languages
5. Add <PackageId>.yaml manifest file for general package metadata

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1000x per month
- Files: manifests/<first-letter>/<Publisher>/<PackageName>/<Version>/<PackageId>.installer.yaml, manifests/<first-letter>/<Publisher>/<PackageName>/<Version>/<PackageId>.locale.en-US.yaml, manifests/<first-letter>/<Publisher>/<PackageName>/<Version>/<PackageId>.locale.<other>.yaml

